<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tvojton.online – AI služby pre každého</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .signup-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .signup-section h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .signup-section p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: white;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                max-width: 280px;
                text-align: center;
            }
            .signup-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tvojton.online – AI služby pre každého</h1>
            <p class="subtitle">Generuj reklamy, videá a využite AI asistenta</p>
            <div class="buttons">
                <a href="#" class="btn btn-primary">Generovať reklamu</a>
                <a href="#" class="btn btn-primary">Generovať video</a>
                <a href="#" class="btn btn-secondary">AI asistent</a>
            </div>
        </header>

        <section class="signup-section">
            <h2>Prihlásiť sa do newsletteru</h2>
            <p>Zostaňte informovaní o novinkách a aktualizáciách</p>
            <form action="/submit-email" method="POST">
                <div class="form-group">
                    <label for="name">Meno (voliteľné)</label>
                    <input type="text" id="name" name="name" placeholder="Vaše meno">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="vas@email.sk" required>
                </div>
                <button type="submit" class="btn btn-submit">Odoslať</button>
            </form>
        </section>

        <footer>
            <p>&copy; 2026 Tvojton.online. Všetky práva vyhradené.</p>
        </footer>
    </div>
</body>
</html>
